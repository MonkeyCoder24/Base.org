<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Ghana Base</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<!--Header Section Begins-->
<header>
    <div class="topbar container">
        <div class="brand">The Ghana Base</div>
        <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
        <nav class="nav">
            <ul>
                <li><a href="index.html">WHO WE ARE</a></li>
                <li><a href="where-we-stand.html">WHERE WE STAND</a></li>
                <li><a href="take-action.html">TAKE ACTION</a></li>

            </ul>
        </nav>
    </div>
</header>
<!--header Section Ends-->
</head>
<body>
<!--Sign Up Section Begins-->
<main id="signup" class="signup-page">
    <div class="decor top-left"></div>
    <div class="card-wrap container">
        <section class="card signup-card" aria-labelledby="signup-title">
            <h2 id="signup-title" class="card-title">Sign up</h2>
            <p class="card-sub">Sign up to receive updates, news, and ways to get involved.</p>

            <form class="signup-form" aria-label="Sign up form">
                <input type="text" name="first" placeholder="First name" required>
                <input type="text" name="last" placeholder="Last name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="date" name="birth" placeholder="Birth date">
                <input type="tel" name="phone" placeholder="Phone number">
                <input type="password" name="password" placeholder="Password" required>
                <input type="password" name="confirm" placeholder="Confirm password" required>

                <input type="submit" class="join-btn" value="Sign Up">
            </form>

            <div class="meta">
                <p>Already have an account? <a href="login.html">Log in</a></p>
            </div>

            <div class="divider"><span>or</span></div>
            <button class="google-btn" aria-label="Sign up with Google">
                <img src="https://www.gstatic.com/devrel-devsite/prod/vb2a5f1b4f6a1f5fd1f2a7d4a3f0d2a1f0b2/google.svg" alt="Google"/>
                Sign up with Google
            </button>
        </section>
    </div>
    <div class="decor bottom-right"></div>
</main>
<!--Sign Up Section Ends-->
</body>
</html>

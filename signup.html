<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - The Ghana Base</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="signup.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;700&display=swap" rel="stylesheet">
</head>
<body>
<!--Header Section Begins-->
<header>
    <div class="topbar container">
        <div class="brand">The Ghana Base</div>
        <button class="nav-toggle" aria-label="Toggle navigation">☰</button>
        <nav class="nav">
            <ul>
                <li><a href="index.html">WHO WE ARE</a></li>
                <li><a href="where-we-stand.html">WHERE WE STAND</a></li>
                <li><a href="take-action.html">TAKE ACTION</a></li>

            </ul>
        </nav>
    </div>
</header>
<!--header Section Ends-->
</head>
<body>
<!--Sign Up Section Begins-->
<main id="signup" class="signup-page">
  <div class="decor top-left"></div>
  <div class="card-wrap container">
    <section class="card signup-card" aria-labelledby="signup-title">
      <h2 id="signup-title" class="card-title">Sign up</h2>
      <p class="card-sub">Sign up to receive updates, news, and ways to get involved.</p>
      <iframe src="https://docs.google.com/forms/d/e/1FAIpQLSd9IiVkeVKwukq8NsTQJQVsZ2q9SLJI44CE7vXB-Y5xXyz-tg/viewform?embedded=true" width="640" height="1495" frameborder="0" marginheight="0" marginwidth="0">Loading…</iframe>
    </section>
  </div>
  <div class="decor bottom-right"></div>
</main>
<!--Sign Up Section Ends-->
<script>
  const form = document.querySelector('.signup-form');
  const messageDiv = document.getElementById('message');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    messageDiv.textContent = '';
    messageDiv.classList.add('hidden');

    const formData = new FormData(form);
    const data = Object.fromEntries(formData);

    try {
      const apiUrl = window.location.origin.includes('localhost') || window.location.origin.includes('127.0.0.1')
        ? `${window.location.origin}/api/signup`
        : 'https://ghana-base.onrender.com/api/signup';

      const response = await fetch(apiUrl, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(data)
      });

      const result = await response.json();

      if (response.ok) {
        messageDiv.classList.remove('hidden');
        messageDiv.classList.add('success');
        messageDiv.textContent = 'Thank you! Your signup has been recorded.';
        form.reset();
        setTimeout(() => messageDiv.classList.add('hidden'), 5000);
      } else {
        messageDiv.classList.remove('hidden');
        messageDiv.classList.add('error');
        messageDiv.textContent = result.error || 'Signup failed. Please try again.';
      }
    } catch (err) {
      console.error('Error:', err);
      messageDiv.classList.remove('hidden');
      messageDiv.classList.add('error');
      messageDiv.textContent = 'Connection error. Please check the backend server is running.';
    }
  });
</script>
</body>
</html>
